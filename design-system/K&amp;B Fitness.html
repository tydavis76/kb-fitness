<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>K&B Fitness — Workout app prototype</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: #0B0D11; color: #F3F5F7; font-family: Inter, system-ui, sans-serif; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: #2A313D; border-radius: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  button { font-family: inherit; }
  /* hide scrollbars inside phone */
  .ph-scroll::-webkit-scrollbar { width: 4px; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Shared: components, data, design canvas, tweaks panel -->
  <script type="text/babel" src="lib/components.jsx"></script>
  <script type="text/babel" src="lib/data.jsx"></script>
  <script type="text/babel" src="lib/units.jsx"></script>
  <script type="text/babel" src="lib/timer.jsx"></script>
  <script type="text/babel" src="lib/design-canvas.jsx"></script>
  <script type="text/babel" src="lib/tweaks-panel.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="screens/sessions.jsx"></script>
  <script type="text/babel" src="screens/active.jsx"></script>
  <script type="text/babel" src="screens/sheets.jsx"></script>
  <script type="text/babel" src="screens/programs.jsx"></script>
  <script type="text/babel" src="screens/programmer.jsx"></script>
  <script type="text/babel" src="screens/insights.jsx"></script>
  <script type="text/babel" src="screens/exercise-detail.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
