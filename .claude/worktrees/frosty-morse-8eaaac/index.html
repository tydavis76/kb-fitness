<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 580px;
    }

    a.card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    a.card:hover {
      background: #151515;
      border-color: #d4890a44;
    }

    a.card:active {
      background: #1a1a1a;
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .icon svg, .icon img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .name {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f0f0;
    }

    .desc {
      font-size: 0.8rem;
      color: #555;
      line-height: 1.4;
    }

    .arrow {
      margin-left: auto;
      color: #333;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>My Apps</h1>

  <div class="grid">
    <a class="card" href="rkc-tracker/">
      <div class="icon">
        <img src="rkc-tracker/icon.svg" alt="" />
      </div>
      <div class="meta">
        <span class="name">RKC Tracker</span>
        <span class="desc">Kettlebell program tracker</span>
      </div>
      <svg class="arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <a class="card" href="kb-fitness/dist/">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
          <rect width="192" height="192" rx="40" fill="#111"/>
          <path d="M56 96h80M56 96c0-11 9-20 20-20h48c11 0 20 9 20 20s-9 20-20 20H76c-11 0-20-9-20-20z" stroke="#d4890a" stroke-width="10" fill="none" stroke-linecap="round"/>
          <rect x="38" y="80" width="18" height="32" rx="9" fill="#d4890a"/>
          <rect x="136" y="80" width="18" height="32" rx="9" fill="#d4890a"/>
          <rect x="28" y="86" width="14" height="20" rx="7" fill="#d4890a"/>
          <rect x="150" y="86" width="14" height="20" rx="7" fill="#d4890a"/>
        </svg>
      </div>
      <div class="meta">
        <span class="name">KB Fitness</span>
        <span class="desc">Workout planner &amp; history</span>
      </div>
      <svg class="arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</body>
</html>
